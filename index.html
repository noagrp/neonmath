<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEON_MATH</title>
    <style>
        :root { --neon-blue: #0ff; --neon-red: #f44; --neon-green: #4f4; --bg: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: #111; color: #fff; font-family: 'Courier New', monospace; 
            margin: 0; padding: 0; 
            /* FIXED: Use dvh to ensure everything fits on mobile screens */
            width: 100vw; height: 100dvh; 
            overflow: hidden; touch-action: none; display: flex; justify-content: center;
        }

        #master-wrapper {
            width: 100%; max-width: 450px; height: 100%; background: var(--bg);
            display: flex; flex-direction: column; position: relative;
            border-left: 1px solid #222; border-right: 1px solid #222;
        }

        /* HEADER (Slightly smaller at 12%) */
        #top-interface {
            height: 12%; width: 100%; background: #0a0a0a; 
            border-bottom: 2px solid #222; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            padding: 5px; z-index: 50;
        }
        #stats-row { width: 90%; display: flex; justify-content: space-between; font-size: 0.8rem; color: #666; }
        #input-box { 
            font-size: 2.2rem; font-weight: bold; color: #fff; 
            text-shadow: 0 0 15px var(--neon-blue); letter-spacing: 4px;
            height: 40px; text-align: center;
        }

        /* GAME AREA (48%) */
        #game-area {
            height: 48%; width: 100%; position: relative;
            background: #000; border-bottom: 1px solid #111;
        }
        canvas { display: block; width: 100%; height: 100%; }

        /* KEYBOARD (Locked to 40% to ensure Execute is visible) */
        #kb-container { 
            height: 40%; width: 100%; background: #050505;
            display: none; grid-template-columns: repeat(3, 1fr); gap: 6px;
            padding: 8px; touch-action: manipulation;
        }
        .key { 
            background: #151515; border: 1px solid #333; color: #fff; 
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; font-weight: bold; border-radius: 4px;
            cursor: pointer; user-select: none;
        }
        .key:active { background: #fff; color: #000; }
        .clr { color: var(--neon-red); border-color: var(--neon-red); }
        .exe { color: var(--neon-green); border-color: var(--neon-green); grid-column: span 3; font-size: 1rem; }
        .minus { color: var(--neon-blue); border-color: var(--neon-blue); }

        .screen { 
            position: absolute; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            z-index: 100; text-align: center;
        }
        .menu-btn { 
            width: 260px; padding: 18px; margin: 10px; border: 2px solid var(--neon-blue); 
            background: transparent; color: var(--neon-blue); font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="master-wrapper">
        <div id="menu-screen" class="screen">
            <h1 style="letter-spacing: 5px; color: var(--neon-blue);">NEON_MATH</h1>
            <button class="menu-btn" onclick="startGame('easy')">01_EASY_MODE</button>
            <button class="menu-btn" onclick="startGame('hard')">02_HARD_MODE</button>
        </div>

        <header id="top-interface">
            <div id="stats-row"><span id="lvl-txt">NODE: 1</span><span id="hp-txt">SHIELD: 100%</span></div>
            <div id="input-box">_</div>
        </header>
        
        <main id="game-area">
            <canvas id="gameCanvas"></canvas>
        </main>

        <footer id="kb-container">
            <div class="key" onclick="key('1')">1</div><div class="key" onclick="key('2')">2</div><div class="key" onclick="key('3')">3</div>
            <div class="key" onclick="key('4')">4</div><div class="key" onclick="key('5')">5</div><div class="key" onclick="key('6')">6</div>
            <div class="key" onclick="key('7')">7</div><div class="key" onclick="key('8')">8</div><div class="key" onclick="key('9')">9</div>
            <div class="key clr" onclick="key('C')">CLR</div><div class="key" onclick="key('0')">0</div><div class="key minus" onclick="key('-')">-</div>
            <div class="key exe" onclick="key('E')">EXECUTE_DECODE</div>
        </footer>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let mode = 'easy', score = 0, hp = 5, level = 1, isRunning = false;
        let enemies = [], lastSpawn = 0, currentInput = "";
        const NEONS = ['#0ff', '#f0f', '#0f0', '#ff0', '#fff', '#f44'];

        function startGame(m) {
            mode = m; score = 0; hp = 5; level = 1; enemies = []; 
            isRunning = true;
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('top-interface').style.display = 'flex';
            document.getElementById('kb-container').style.display = 'grid';
            
            // Recalculate canvas size based on new proportions
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            
            updateUI();
            requestAnimationFrame(gameLoop);
        }

        function createEnemy() {
            let text, ans;
            if (mode === 'easy') {
                const eType = Math.floor(Math.random() * 4);
                if (eType === 0) { 
                    let n1 = Math.floor(Math.random() * 20); let n2 = Math.floor(Math.random() * 20); 
                    ans = n1 + n2; text = `${n1}+${n2}`; 
                } else if (eType === 1) { 
                    let n1 = Math.floor(Math.random() * 10); let n2 = Math.floor(Math.random() * 15); 
                    ans = n1 - n2; text = `${n1}-${n2}`; 
                } else if (eType === 2) {
                    let n1 = Math.floor(Math.random() * 10); let n2 = Math.floor(Math.random() * 5);
                    ans = n1 * n2; text = `${n1}*${n2}`;
                } else {
                    ans = Math.floor(Math.random() * 5) + 1; let n2 = Math.floor(Math.random() * 5) + 1;
                    let n1 = ans * n2; text = `${n1}/${n2}`;
                }
            } else {
                const qType = Math.floor(Math.random() * 5);
                if (qType === 0) { ans = Math.floor(Math.random() * 20); let a = Math.floor(Math.random() * 20); text = `X + ${a} = ${ans+a}`; }
                else if (qType === 1) { ans = Math.floor(Math.random() * 12) + 1; text = `√${ans*ans}`; }
                else if (qType === 2) { let m = Math.floor(Math.random() * 10) + 2; let a = Math.floor(Math.random() * 5) + 2; ans = m * a; text = `FORCE(M:${m},A:${a})`; }
                else if (qType === 3) { let v = Math.floor(Math.random() * 15) + 5; let t = Math.floor(Math.random() * 5) + 2; ans = v * t; text = `DIST(V:${v},T:${t})`; }
                else { let m = Math.floor(Math.random() * 90) + 5; ans = m * 10; text = `WEIGHT(M:${m},G:10)`; }
            }
            enemies.push({ x: Math.random() * (canvas.width - 160) + 80, y: -50, text, ans, color: NEONS[Math.floor(Math.random() * NEONS.length)], speed: 0.8 + (level * 0.15) });
        }

        function gameLoop(time) {
            if (!isRunning) return;
            if (time - lastSpawn > Math.max(800, 3000 - (level * 300))) { createEnemy(); lastSpawn = time; }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            enemies.forEach((en, i) => {
                en.y += en.speed;
                let fontSize = en.text.length > 12 ? "16px" : "22px";
                ctx.fillStyle = en.color; ctx.font = `bold ${fontSize} Courier New`; ctx.textAlign = 'center';
                ctx.fillText(en.text, en.x, en.y);
                if (en.y > canvas.height) { enemies.splice(i, 1); hp--; updateUI(); if (hp <= 0) location.reload(); }
            });
            requestAnimationFrame(gameLoop);
        }

        function key(val) {
            if (val === 'C') {
                currentInput = "";
            } else if (val === 'E') {
                let match = enemies.findIndex(en => en.ans === Number(currentInput));
                if (match !== -1) { 
                    enemies.splice(match, 1); 
                    score += 100; 
                    if (score % 500 === 0) level++; 
                }
                currentInput = "";
            } else if (val === '-') {
                if (currentInput === "") currentInput = "-";
            } else {
                if(currentInput.length < 6) currentInput += val;
            }
            document.getElementById('input-box').innerText = currentInput || "_";
            updateUI();
        }

        function updateUI() {
            document.getElementById('hp-txt').innerText = `SHIELD: ${hp * 20}%`;
            document.getElementById('lvl-txt').innerText = `NODE: ${level}`;
            document.getElementById('hp-txt').style.color = hp < 2 ? '#f44' : '#fff';
        }

        window.addEventListener('keydown', e => {
            if (!isRunning) return;
            if (e.key >= '0' && e.key <= '9') key(e.key);
            if (e.key === '-') key('-');
            if (e.key === 'Enter') key('E');
            if (e.key === 'Backspace') key('C');
        });
    </script>
</body>
</html>
